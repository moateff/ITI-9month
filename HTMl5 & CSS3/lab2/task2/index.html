<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Right-Angled Triangle</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<h2>Right-Angled Triangle</h2>

<svg class="svg" width="250" height="250" viewBox="0 0 250 250" aria-label="Right-angled triangle">
    <!-- Triangle -->
    <polygon points="50,200 120,200 120,50" 
             fill="red" 
             stroke="black" 
             stroke-width="1"/>
             
    <!-- Labels -->
    <text x="80" y="215" font-size="16" fill="black">a</text> <!-- base -->
    <text x="130" y="140" font-size="16" fill="black">b</text> <!-- height -->
    <text x="60" y="140" font-size="16" fill="black">c</text> <!-- hypotenuse -->
</svg>

<p>According to the Pythagoras theorem:</p>

<math xmlns="http://www.w3.org/1998/Math/MathML" class="equation">
    <mi>c</mi>
    <mo>=</mo>
    <msqrt>
        <msup><mi>a</mi><mn>2</mn></msup>
        <mo>+</mo>
        <msup><mi>b</mi><mn>2</mn></msup>
    </msqrt>
</math>

</body>
</html>
