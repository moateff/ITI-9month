<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RGB Color Controller</title>
</head>
<body>

<div class="container">
    <div class="control">
        <label for="red">Red</label>
        <input id="red" type="range" min="0" max="255" step="1" value="0" class="red-range">
    </div>

    <div class="control">
        <label for="green">Green</label>
        <input id="green" type="range" min="0" max="255" step="1" value="0" class="green-range">
    </div>

    <div class="control">
        <label for="blue">Blue</label>
        <input id="blue" type="range" min="0" max="255" step="1" value="0" class="blue-range">
    </div>

    <p class="text">Change the three color ranges above!</p>
</div>

<script src="script.js"></script>
</body>
</html>
